# RSpec configuration
plugins:
  - rubocop-rspec

RSpec:
  Enabled: true

# Disable some overly strict cops
RSpec/ExampleLength:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/NestedGroups:
  Max: 5

RSpec/NamedSubject:
  Enabled: false

RSpec/RepeatedExample:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/RepeatedDescription:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false
