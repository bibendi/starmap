# LDAP Configuration for Starmap
# This file contains LDAP connection settings for different environments

development:
  host: ldap.company.com
  port: 389
  base_dn: dc=company,dc=com
  attribute: uid
  admin_user: cn=admin,dc=company,dc=com
  admin_password: <%= ENV['LDAP_ADMIN_PASSWORD'] || 'admin_password' %>
  ssl: false
  tls: false
  group_base: ou=groups,dc=company,dc=com
  user_filter: "(objectClass=person)"
  group_filter: "(objectClass=groupOfNames)"

  # Field mappings
  email_attr: mail
  first_name_attr: givenName
  last_name_attr: sn
  display_name_attr: displayName
  department_attr: department
  position_attr: title
  phone_attr: telephoneNumber
  employee_id_attr: employeeNumber

  # Group mappings for roles
  admin_groups:
    - cn=starmap-admin,ou=groups,dc=company,dc=com
  unit_lead_groups:
    - cn=starmap-unit-lead,ou=groups,dc=company,dc=com
  team_lead_groups:
    - cn=starmap-team-lead,ou=groups,dc=company,dc=com
  engineer_groups:
    - cn=starmap-engineer,ou=groups,dc=company,dc=com

test:
  host: ldap.test.local
  port: 389
  base_dn: dc=test,dc=local
  attribute: uid
  admin_user: cn=admin,dc=test,dc=local
  admin_password: test_password
  ssl: false
  tls: false
  group_base: ou=groups,dc=test,dc=local
  user_filter: "(objectClass=person)"
  group_filter: "(objectClass=groupOfNames)"

  # Field mappings
  email_attr: mail
  first_name_attr: givenName
  last_name_attr: sn
  display_name_attr: displayName
  department_attr: department
  position_attr: title
  phone_attr: telephoneNumber
  employee_id_attr: employeeNumber

  # Group mappings for roles
  admin_groups:
    - cn=starmap-admin,ou=groups,dc=test,dc=local
  unit_lead_groups:
    - cn=starmap-unit-lead,ou=groups,dc=test,dc=local
  team_lead_groups:
    - cn=starmap-team-lead,ou=groups,dc=test,dc=local
  engineer_groups:
    - cn=starmap-engineer,ou=groups,dc=test,dc=local

production:
  host: <%= ENV['LDAP_HOST'] %>
  port: <%= ENV['LDAP_PORT'] || 636 %>
  base_dn: <%= ENV['LDAP_BASE_DN'] %>
  attribute: <%= ENV['LDAP_ATTRIBUTE'] || 'uid' %>
  admin_user: <%= ENV['LDAP_ADMIN_USER'] %>
  admin_password: <%= ENV['LDAP_ADMIN_PASSWORD'] %>
  ssl: <%= ENV['LDAP_SSL'] == 'true' %>
  tls: <%= ENV['LDAP_TLS'] == 'true' %>
  group_base: <%= ENV['LDAP_GROUP_BASE'] %>
  user_filter: "(objectClass=person)"
  group_filter: "(objectClass=groupOfNames)"

  # Field mappings
  email_attr: <%= ENV['LDAP_EMAIL_ATTR'] || 'mail' %>
  first_name_attr: <%= ENV['LDAP_FIRST_NAME_ATTR'] || 'givenName' %>
  last_name_attr: <%= ENV['LDAP_LAST_NAME_ATTR'] || 'sn' %>
  display_name_attr: <%= ENV['LDAP_DISPLAY_NAME_ATTR'] || 'displayName' %>
  department_attr: <%= ENV['LDAP_DEPARTMENT_ATTR'] || 'department' %>
  position_attr: <%= ENV['LDAP_POSITION_ATTR'] || 'title' %>
  phone_attr: <%= ENV['LDAP_PHONE_ATTR'] || 'telephoneNumber' %>
  employee_id_attr: <%= ENV['LDAP_EMPLOYEE_ID_ATTR'] || 'employeeNumber' %>

  # Group mappings for roles
  admin_groups: <%= ENV['LDAP_ADMIN_GROUPS']&.split(',') || [] %>
  unit_lead_groups: <%= ENV['LDAP_UNIT_LEAD_GROUPS']&.split(',') || [] %>
  team_lead_groups: <%= ENV['LDAP_TEAM_LEAD_GROUPS']&.split(',') || [] %>
  engineer_groups: <%= ENV['LDAP_ENGINEER_GROUPS']&.split(',') || [] %>
