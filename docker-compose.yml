version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: starmap_postgres
    environment:
      POSTGRES_DB: starmap_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for Solid Queue (optional, can be added later)
  redis:
    image: redis:7-alpine
    container_name: starmap_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
